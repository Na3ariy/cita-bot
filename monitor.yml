name: Cita Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # кожні 5 хвилин
  workflow_dispatch:          # ручний запуск через кнопку на GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # примусова зупинка якщо зависне

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run checker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}   # автоматично доступний
          GITHUB_REPO:    ${{ github.repository }}       # наприклад: yourname/cita-bot
        run: python checker.py
