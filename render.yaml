services:
  - type: worker          # Background Worker – без web-сервера, безкоштовний тариф
    name: cita-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false       # введеш вручну в Render Dashboard
      - key: CHECK_INTERVAL
        value: "300"      # 5 хвилин (можеш змінити)
    autoDeploy: true
