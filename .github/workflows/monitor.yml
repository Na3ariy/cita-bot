name: Cita Monitor

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Test ICP connectivity
        run: |
          echo "=== Тест з'єднання ==="
          curl -v --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept-Language: es-ES,es;q=0.9" \
            "https://icp.administracionelectronica.gob.es/icpplus/index.html" \
            -o /dev/null -w "HTTP статус: %{http_code}\nЧас з'єднання: %{time_connect}s\nЗагальний час: %{time_total}s\n"
